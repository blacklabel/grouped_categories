<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

	
<title>Grouped Categories - Highcharts module</title>

<script src="https://code.highcharts.com/highcharts.js"></script> 
<script src="./dist/grouped-categories.js"></script>

</head>
<body>
<div id="main-content" style="padding: 20px;">

<div class="chart-container" id="chart" style="height: 500px;">

</div>


<script>

window.chart = new Highcharts.Chart({
    chart: {
        renderTo: "chart",
        type: "column",
        inverted: false,
        // styledMode: true
    },
    series: [{
        data: [4, 14, 18, 5, 6, 5, 14, 15, 18, 10, 11, 12]
    }],
    xAxis: {
        xlabels: {
            groupedOptions: [{
                style: {
                    color: 'red' // set red font for labels in 1st-Level  
                },
                rotation: -90,
            }, {
                style: {
                    color: 'green' // set red font for labels in 1st-Level
                },
                rotation: 90,
            }],
            rotation: -90, // 0-level options aren't changed, use them as always
            distance: 10
        },
        xcategories: ["Apple", "Banana", "Orange", "Carrot", "Potato", "Tomato", "Cod", "Salmon", "Tuna"],
        xcategories: [{
            name: "Fruit",
            categories: ["Apple", "Banana", "Orange"]
        }, {
            name: "Vegetable",
            categories: ["Carrot", "Potato", "Tomato"]
        }, {
            name: "Fish",
            categories: ["Cod", "Salmon", "Tuna"]
        }],
        categories: [{
            name: "America",
            categories: [{
                name: "USA",
                categories: ["New York", "San Francisco"]
            }, {
                name: "Canada",
                categories: ["Toronto", "Vancouver"]
            }, {
                name: "Mexico",
                categories: ["Acapulco", "Leon"]
            }]
            }, {
            name: "Europe",
            categories: [{
                name: "United Kingdom",
                categories: ["London", "Liverpool"]
            }, {
                name: "France",
                categories: ["Paris", "Marseille"]
            }, {
                name: "Germany",
                categories: ["Berlin", "Munich"]
            }]
        }],
        xlabels: {
            distance: 5
        }
    }
});
</script>

</body>
</html>
